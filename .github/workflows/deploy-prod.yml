name: Deploy dea-agent to PROD

# 1. Trigger: This ONLY runs when code is merged into the 'main' branch
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Securely authenticate to Google Cloud (Production)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # IMPORTANT: In a real enterprise setup, Prod is a completely separate Google Cloud project. 
          # Therefore, you would run a second Terraform script to get a PROD Provider and PROD Service Account.
          # For a simple demo in a single project, you can reuse the Dev strings here.
          workload_identity_provider: 'projects/87200014978/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-deployer@sa-demo-argolis.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step D: Compile the Dataform project for PRODUCTION
      - name: Compile Dataform Project (PROD)
        id: compile
        run: |
          COMPILATION=$(gcloud dataform compilations create \
            --project="sa-demo-argolis" \
            --location="us-central1" \
            --repository="data-eng-core" \
            --git-commitish="${{ github.sha }}" \
            --default-schema="your_production_dataset" \
            --format="value(name)")
          
          echo "COMPILATION_ID=$COMPILATION" >> $GITHUB_ENV

      # Step E: Execute the compiled workflow in BigQuery
      - name: Execute Dataform Workflow (PROD)
        run: |
          gcloud dataform workflow-invocations create \
            --project="sa-demo-argolis" \
            --location="us-central1" \
            --repository="data-eng-core" \
            --compilation-result="${{ env.COMPILATION_ID }}"
