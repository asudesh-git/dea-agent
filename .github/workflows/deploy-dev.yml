name: Deploy dea-agent to Dev

# 1. Trigger: Run this pipeline when code is pushed to the 'develop' branch
on:
  push:
    branches:
      - develop

# 2. Permissions: Required for secure, keyless authentication to Google Cloud
permissions:
  contents: read
  id-token: write

# 3. The Deployment Job
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
      # Step A: Download your repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Securely authenticate to Google Cloud using Workload Identity
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # REPLACE the string below with the 'workload_identity_provider_string' from your Terraform output
          workload_identity_provider: 'projects/87200014978/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          
          # REPLACE the email below with the 'service_account_email' from your Terraform output
          service_account: 'github-actions-deployer@sa-demo-argolis.iam.gserviceaccount.com'

      # Step C: Install the Google Cloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step D: Deploy the code to Cloud Run
      # (Make sure to replace YOUR_GCP_PROJECT_ID with your actual Dev project ID)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy dea-agent-dev \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --project sa-demo-argolis
